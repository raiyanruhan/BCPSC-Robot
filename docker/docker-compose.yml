version: '3.8'

services:
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "8000:8000"
    environment:
      - REDIS_URL=redis://redis:6379/0
      # Keys will be loaded from config.md inside the container or env vars
    volumes:
      - ../config.md:/app/config.md
    depends_on:
      - redis

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
